<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Channel Name</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- HERO -->
  <header class="hero">
    <div class="container">
      <h1>Your YouTube Channel</h1>
      <p>Helping you learn, build, and grow 🚀</p>
      <a href="#videos" class="btn">Watch Videos</a>
    </div>
  </header>

  <!-- ABOUT -->
  <section class="about container">
    <h2>About</h2>
    <p>
      I create content about [your niche]. Expect tutorials, breakdowns,
      and real-world insights without the fluff.
    </p>
  </section>

  <!-- EMAIL SIGNUP -->
  <section class="signup">
    <div class="container">
      <h2>Join the Newsletter</h2>
      <p>Get updates when new videos drop.</p>
      <form id="emailForm">
        <input type="email" placeholder="Enter your email" required />
        <button type="submit">Subscribe</button>
      </form>
      <p id="formMessage"></p>
    </div>
  </section>

  <!-- VIDEOS -->
  <section id="videos" class="videos container">
    <h2>Latest Videos</h2>

    <div class="video-grid">
      <!-- Replace with your actual video embeds -->
      <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
      <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
      <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
    </div>

  </section>

  <footer>
    <p>© 2026 Your Channel</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
